services:

  # ────────────────────────────────────────────────────────────────────────────
  # app – LangChain Blog Automation API
  #
  # POST /generate   { "category": "technology" }
  # → runs the pipeline and returns blog data as JSON
  #
  # Agents:
  #   • ResearchAgent  – finds the best trending topic in the given category
  #   • WritingAgent   – writes a full blog post (Gemini gemini-2.0-flash)
  #   • ImageAgent     – generates a header image (Gemini Imagen 3)
  #
  # Errors are written to ./logs/pipeline_errors.log on the host.
  # ────────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: blog_app
    restart: unless-stopped
    env_file: .env
    environment:
      GEMINI_API_KEY:     ${GEMINI_API_KEY}
      GEMINI_TEXT_MODEL:  ${GEMINI_TEXT_MODEL:-gemini-2.0-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-imagen-3.0-generate-002}
    ports:
      - "8000:8000"
    volumes:
      - blog_images:/app/images     # generated header images
      - ./logs:/app/logs            # pipeline_errors.log visible on host

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  blog_images:
